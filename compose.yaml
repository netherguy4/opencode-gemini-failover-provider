services:
  gemini-failover-provider:
    build: .
    container_name: gemini-failover-provider
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8787}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gemini-flash-latest}
      FORCE_DEFAULT_MODEL: ${FORCE_DEFAULT_MODEL:-false}
    ports:
      - "${PUBLISHED_HOST:-127.0.0.1}:${PORT:-8787}:${PORT:-8787}"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || '8787') + '/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
